<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanIQ — Headcount Planning</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
/* ── Reset ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── Tokens ── */
:root {
  --color-brand:          #1D9E75;
  --color-brand-dark:     #0F6E56;

  --color-bg:             #ffffff;
  --color-bg-secondary:   #f5f5f3;
  --color-bg-hover:       #f0f0ee;

  --color-text-primary:   #1a1a18;
  --color-text-secondary: #6b6b67;
  --color-text-tertiary:  #a0a09c;

  --color-border:         rgba(0,0,0,0.10);
  --color-border-strong:  rgba(0,0,0,0.18);

  --color-filled-bg:      #E1F5EE;
  --color-filled-text:    #0F6E56;
  --color-open-bg:        #FAEEDA;
  --color-open-text:      #854F0B;
  --color-planned-bg:     #EEEDFE;
  --color-planned-text:   #534AB7;

  --color-danger:         #E24B4A;
  --color-danger-bg:      #FCEBEB;

  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;

  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* ── Dark mode ── */
@media (prefers-color-scheme: dark) {
  :root {
    --color-bg:             #1c1c1a;
    --color-bg-secondary:   #252523;
    --color-bg-hover:       #2e2e2b;

    --color-text-primary:   #f0f0ec;
    --color-text-secondary: #9a9a94;
    --color-text-tertiary:  #5e5e5a;

    --color-border:         rgba(255,255,255,0.10);
    --color-border-strong:  rgba(255,255,255,0.18);

    --color-filled-bg:      #085041;
    --color-filled-text:    #9FE1CB;
    --color-open-bg:        #633806;
    --color-open-text:      #FAC775;
    --color-planned-bg:     #3C3489;
    --color-planned-text:   #CECBF6;

    --color-danger-bg:      #501313;
  }
}

/* ── Base ── */
body {
  font-family: var(--font-sans);
  background: var(--color-bg-secondary);
  color: var(--color-text-primary);
  min-height: 100vh;
}

/* ── App shell ── */
.app {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--color-bg);
  border-right: 0.5px solid var(--color-border);
  padding: 1.25rem 0;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.25s ease, min-width 0.25s ease, border-color 0.25s ease;
}

.sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-color: transparent;
}

/* ── Right panel ── */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ── Top bar ── */
.top-bar {
  display: flex;
  align-items: center;
  background: var(--color-bg);
  border-bottom: 0.5px solid var(--color-border);
  padding: 0.875rem 1.5rem;
  flex-shrink: 0;
}

.burger-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-text-secondary);
  font-size: 20px;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  line-height: 1;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color 0.15s, background 0.15s;
}

.burger-btn:hover {
  color: var(--color-text-primary);
  background: var(--color-bg-hover);
}

.logo {
  flex: 1;
  text-align: center;
  font-size: 30px;
  font-weight: 700;
  color: var(--color-text-primary);
  letter-spacing: -0.5px;
}

.logo span {
  color: var(--color-brand);
}

/* balances the burger button so the logo stays truly centered */
.top-bar-end {
  width: 32px;
  flex-shrink: 0;
}

/* ── Sidebar nav ── */
.nav-section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 0 14px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}

.nav-item:hover {
  background: var(--color-bg-hover);
  color: var(--color-text-primary);
}

.nav-item.active {
  background: var(--color-bg-secondary);
  color: var(--color-brand);
  font-weight: 500;
}

.nav-item .ti {
  font-size: 15px;
}

/* ── Page content ── */
.page-content {
  flex: 1;
  padding: 2rem;
  overflow: auto;
}

/* ── Page header ── */
.page-header {
  display: flex;
  align-items: center;
  margin-bottom: 1.5rem;
}

.dept-badge {
  font-size: 13px;
  color: var(--color-text-secondary);
  background: var(--color-bg);
  border: 0.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 5px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.dept-badge .ti {
  font-size: 14px;
}

/* ── Tool view (centered content wrapper) ── */
.tool-view {
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
}

/* ── Summary cards ── */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 1.5rem;
}

@media (max-width: 640px) {
  .summary-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

.metric {
  background: var(--color-bg);
  border: 0.5px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
}

.metric-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}

.metric-value {
  font-size: 24px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.5px;
}

.metric-sub {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* ── Table ── */
.table-wrap {
  background: var(--color-bg);
  border: 0.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 1rem;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  table-layout: fixed;
}

thead tr {
  background: var(--color-bg-secondary);
}

th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 500;
  font-size: 12px;
  color: var(--color-text-secondary);
  border-bottom: 0.5px solid var(--color-border);
  white-space: nowrap;
  overflow: hidden;
}

td {
  padding: 8px 12px;
  color: var(--color-text-primary);
  border-bottom: 0.5px solid var(--color-border);
  vertical-align: middle;
  overflow: hidden;
}

tr:last-child td {
  border-bottom: none;
}

tr:hover td {
  background: var(--color-bg-hover);
}

/* ── Inline inputs ── */
td input,
td select {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--color-text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  padding: 2px 0;
  outline: none;
  cursor: pointer;
}

td input:focus,
td select:focus {
  background: var(--color-bg-secondary);
  border-radius: 4px;
  padding: 2px 6px;
}

/* ── Status pills ── */
.status-pill {
  display: inline-block;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
}

.status-filled  { background: var(--color-filled-bg);  color: var(--color-filled-text); }
.status-open    { background: var(--color-open-bg);    color: var(--color-open-text); }
.status-planned { background: var(--color-planned-bg); color: var(--color-planned-text); }

/* ── Cost cells ── */
.cost-cell {
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

/* ── Delete button ── */
.del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-text-tertiary);
  font-size: 16px;
  padding: 4px 6px;
  border-radius: var(--radius-sm);
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.del-btn:hover {
  color: var(--color-danger);
  background: var(--color-danger-bg);
}

/* ── Add row ── */
.add-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  cursor: pointer;
  color: var(--color-text-secondary);
  font-size: 13px;
  border-top: 0.5px solid var(--color-border);
  transition: background 0.15s, color 0.15s;
  user-select: none;
}

.add-row:hover {
  background: var(--color-bg-hover);
  color: var(--color-text-primary);
}

.add-row .ti {
  font-size: 16px;
}

/* ── Column widths ── */
.col-role    { width: 18%; }
.col-rate    { width: 9%; }
.col-type    { width: 10%; }
.col-start   { width: 10%; }
.col-monthly { width: 11%; }
.col-annual  { width: 11%; }
.col-status  { width: 10%; }
.col-dept    { width: 15%; }
.col-del     { width: 6%; text-align: center; }

/* ── Footer ── */
.footer-bar {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-family: var(--font-sans);
  cursor: pointer;
  border: 0.5px solid var(--color-border-strong);
  background: transparent;
  color: var(--color-text-primary);
  transition: background 0.15s;
}

.btn:hover {
  background: var(--color-bg-secondary);
}

.btn-primary {
  background: var(--color-brand);
  border-color: var(--color-brand);
  color: #fff;
  font-weight: 500;
}

.btn-primary:hover {
  background: var(--color-brand-dark);
  border-color: var(--color-brand-dark);
}
  </style>
</head>
<body>

  <div class="app">

    <nav class="sidebar" id="sidebar">
      <div class="nav-section-label">Tools</div>
      <div class="nav-item active" data-tool="headcount">
        <i class="ti ti-users" aria-hidden="true"></i>
        <span>Headcount</span>
      </div>
    </nav>

    <div class="right-panel">

      <header class="top-bar">
        <button class="burger-btn" id="burger-btn" aria-label="Toggle sidebar">
          <i class="ti ti-menu-2" aria-hidden="true"></i>
        </button>
        <div class="logo">Plan<span>IQ</span></div>
        <div class="top-bar-end"></div>
      </header>

      <div class="page-content">

        <div class="page-header">
          <div class="dept-badge">
            <i class="ti ti-users" aria-hidden="true"></i>
            Headcount Planning — FY 2026
          </div>
        </div>

        <div class="tool-view">

          <div class="summary-grid" id="summary">
            <div class="metric">
              <div class="metric-label">Total headcount</div>
              <div class="metric-value" id="s-total">0</div>
              <div class="metric-sub">roles</div>
            </div>
            <div class="metric">
              <div class="metric-label">Monthly cost</div>
              <div class="metric-value" id="s-monthly">$0</div>
              <div class="metric-sub">all roles</div>
            </div>
            <div class="metric">
              <div class="metric-label">Annual cost</div>
              <div class="metric-value" id="s-annual">$0</div>
              <div class="metric-sub">remaining FY</div>
            </div>
            <div class="metric">
              <div class="metric-label">Open roles</div>
              <div class="metric-value" id="s-open">0</div>
              <div class="metric-sub">unfilled</div>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="col-role">Role title</th>
                  <th class="col-rate">Rate</th>
                  <th class="col-type">Type</th>
                  <th class="col-start">Start month</th>
                  <th class="col-monthly">Monthly cost</th>
                  <th class="col-annual">Annual cost</th>
                  <th class="col-status">Status</th>
                  <th class="col-dept">Department</th>
                  <th class="col-del"></th>
                </tr>
              </thead>
              <tbody id="hc-body"></tbody>
            </table>
            <div class="add-row" id="add-row-btn" role="button" tabindex="0" aria-label="Add new role">
              <i class="ti ti-plus" aria-hidden="true"></i> Add role
            </div>
          </div>

          <div class="footer-bar">
            <button class="btn btn-primary" onclick="exportCSV()">
              <i class="ti ti-download" aria-hidden="true"></i> Export CSV
            </button>
          </div>

        </div><!-- /tool-view -->

      </div><!-- /page-content -->

    </div><!-- /right-panel -->

  </div><!-- /app -->

  <script>
// ── Constants ──
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const FY_MONTHS = 12;

// ── State ──
let rows = [
  { id: 1, role: 'Senior Engineer',  rate: 140000, type: 'yearly',  start: 1, status: 'filled',  dept: 'Engineering' },
  { id: 2, role: 'Product Manager',  rate: 110000, type: 'yearly',  start: 1, status: 'filled',  dept: 'Product' },
  { id: 3, role: 'Sales Rep',        rate: 65,     type: 'hourly',  start: 3, status: 'open',    dept: 'Sales' },
  { id: 4, role: 'Designer',         rate: 9500,   type: 'monthly', start: 6, status: 'planned', dept: 'Design' },
];
let nextId = 5;

// ── Cost calculations ──
function monthlyCost(r) {
  if (r.type === 'hourly')  return Math.round(r.rate * 40 * 4.33);
  if (r.type === 'monthly') return Math.round(r.rate);
  return Math.round(r.rate / 12);
}

function annualCost(r) {
  const remaining = Math.max(0, FY_MONTHS - r.start + 1);
  return monthlyCost(r) * remaining;
}

// ── Formatting ──
function fmt(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000)    return '$' + Math.round(n / 1000) + 'k';
  return '$' + n.toLocaleString();
}

// ── Summary cards ──
function updateSummary() {
  const total   = rows.length;
  const monthly = rows.reduce((a, r) => a + monthlyCost(r), 0);
  const annual  = rows.reduce((a, r) => a + annualCost(r), 0);
  const open    = rows.filter(r => r.status === 'open').length;

  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-monthly').textContent = fmt(monthly);
  document.getElementById('s-annual').textContent  = fmt(annual);
  document.getElementById('s-open').textContent    = open;
}

// ── Render table ──
function render() {
  const tbody = document.getElementById('hc-body');
  tbody.innerHTML = '';

  rows.forEach(r => {
    const tr = document.createElement('tr');

    const tdRole = cell();
    tdRole.appendChild(editInput(r.role, v => updateField(r.id, 'role', v)));

    const tdRate = cell();
    const rateInput = document.createElement('input');
    rateInput.type  = 'number';
    rateInput.value = r.rate;
    rateInput.style.width = '100%';
    rateInput.addEventListener('change', e => updateField(r.id, 'rate', +e.target.value));
    tdRate.appendChild(rateInput);

    const tdType = cell();
    tdType.appendChild(selectEl(
      [['yearly','Yearly'],['monthly','Monthly'],['hourly','Hourly']],
      r.type,
      v => updateField(r.id, 'type', v)
    ));

    const tdStart = cell();
    tdStart.appendChild(selectEl(
      MONTHS.map((m, i) => [String(i + 1), m]),
      String(r.start),
      v => updateField(r.id, 'start', +v)
    ));

    const tdMonthly = cell('cost-cell');
    tdMonthly.textContent = fmt(monthlyCost(r));

    const tdAnnual = cell('cost-cell');
    tdAnnual.textContent = fmt(annualCost(r));

    const tdStatus = cell();
    tdStatus.appendChild(selectEl(
      [['filled','Filled'],['open','Open'],['planned','Planned']],
      r.status,
      v => updateField(r.id, 'status', v)
    ));

    const tdDept = cell();
    tdDept.appendChild(editInput(r.dept, v => updateField(r.id, 'dept', v)));

    const tdDel = cell();
    tdDel.style.textAlign = 'center';
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.setAttribute('aria-label', 'Delete row');
    delBtn.innerHTML = '<i class="ti ti-trash" aria-hidden="true"></i>';
    delBtn.addEventListener('click', () => deleteRow(r.id));
    tdDel.appendChild(delBtn);

    tr.append(tdRole, tdRate, tdType, tdStart, tdMonthly, tdAnnual, tdStatus, tdDept, tdDel);
    tbody.appendChild(tr);
  });

  updateSummary();
}

// ── DOM helpers ──
function cell(className) {
  const td = document.createElement('td');
  if (className) td.className = className;
  return td;
}

function editInput(value, onChange) {
  const input = document.createElement('input');
  input.type  = 'text';
  input.value = value;
  input.addEventListener('change', e => onChange(e.target.value));
  return input;
}

function selectEl(options, selected, onChange) {
  const sel = document.createElement('select');
  options.forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value   = val;
    opt.textContent = label;
    if (val === selected) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => onChange(e.target.value));
  return sel;
}

// ── Mutations ──
function updateField(id, field, val) {
  const r = rows.find(r => r.id === id);
  if (r) { r[field] = val; render(); }
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id);
  render();
}

function addRow() {
  rows.push({
    id:     nextId++,
    role:   'New role',
    rate:   80000,
    type:   'yearly',
    start:  1,
    status: 'planned',
    dept:   'Engineering',
  });
  render();
  const tbody = document.getElementById('hc-body');
  const lastRow = tbody.lastElementChild;
  if (lastRow) lastRow.querySelector('input').focus();
}

// ── CSV export ──
function exportCSV() {
  const header = ['Role','Rate','Type','Start Month','Monthly Cost','Annual Cost','Status','Department'];
  const rowData = rows.map(r => [
    r.role,
    r.rate,
    r.type,
    MONTHS[r.start - 1],
    monthlyCost(r),
    annualCost(r),
    r.status,
    r.dept,
  ]);

  const csv = [header, ...rowData]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'planiq-headcount.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Event listeners ──
document.getElementById('add-row-btn').addEventListener('click', addRow);
document.getElementById('add-row-btn').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') addRow();
});

document.getElementById('burger-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ── Init ──
render();
  </script>
</body>
</html>
